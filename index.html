<script>

const SB_URL = 'https://cwtinzjbjffilxuglufw.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3dGluempiamZmaWx4dWdsdWZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MDY1OTgsImV4cCI6MjA5NTk4MjU5OH0.zlPbCUYrEZm3vxxZEosDu5Ym-ljJIWHQjLroi44ZAkU';

const sbClient = supabase.createClient(SB_URL, SB_KEY);

let employees = [];
let holidays = [];
let currentEmployeeIndex = 0;
let currentMonthYear = '';
let selectedEmployee = null;

function timeToMinutes(t) { if (!t) return 0; const [h,m] = t.split(':').map(Number); return (h * 60) + m; }
function minutesToTime(min) { 
    const sign = min < 0 ? '-' : '';
    const abs = Math.min(Math.abs(min), 9999);
    return `${sign}${Math.floor(abs/60)}:${String(abs%60).padStart(2,'0')}`;
}

function minutesToDecimal(min) {
    return (min / 60).toFixed(2);
}

function showMessage(msg, type) {
    const modal = document.getElementById('confirmationModal');
    document.getElementById('confirmationMessage').innerHTML = msg;
    modal.style.display = 'flex';
    setTimeout(() => { modal.style.display = 'none'; }, 2000);

function closeConfirmationModal() { document.getElementById('confirmationModal').style.display = 'none'; }
function closeValidationModal() { document.getElementById('validationModal').style.display = 'none'; }
function closeSqlTestModal() { document.getElementById('sqlTestModal').style.display = 'none'; }
function closeEmployeeModalGestor() { document.getElementById('employeeModal').style.display = 'none'; }
function closeLogsModal() { document.getElementById('logsModal').style.display = 'none'; }

async function getServerTime() {
    try {
        const { data } = await sbClient.rpc('get_server_time');
        return new Date(data);
    } catch(e) { 
        return new Date(); 
    }
}

async function loadEmployees() {
    const { data, error } = await sbClient.from('funcionarios').select('*').order('nome');
    if (error) {
        console.error('Erro ao carregar funcionários:', error);
        return [];
    }
    employees = data.filter(e => e.ativo !== false);
    return employees;
}

async function loadAllEmployees() {
    const { data, error } = await sbClient.from('funcionarios').select('*').order('nome');
    if (error) return [];
    return data || [];
}

async function loadHolidays() {
    const { data, error } = await sbClient.from('feriados').select('*');
    if (error) {
        console.error('Erro ao carregar feriados:', error);
        return [];
    }
    holidays = data || [];
    return holidays;
}

async function loadRecords(empId, month, year) {
    const start = `${year}-${String(month).padStart(2,'0')}-01`;
    const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
    const { data, error } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', empId).gte('data', start).lte('data', end);
    if (error) {
        console.error('Erro ao carregar registros:', error);
        return {};
    }
    const records = {};
    if (data) data.forEach(r => { records[r.data] = r; });
    return records;
}

// Verificar se é dia de jornada reduzida (sábado ou feriado)
async function isReducedDay(date) {
    const dow = date.getDay();
    const isSaturday = dow === 6;
    const dateKey = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    const isHoliday = holidays.some(h => h.data === dateKey);
    return isSaturday || isHoliday;
}

// FUNÇÃO PARA REGISTRAR LOG DO GESTOR
async function registrarLogGestor(funcionarioId, funcionarioNome, dataAlteracao, campo, valorAntigo, valorNovo) {
    try {
        const logData = {
            funcionario_id: funcionarioId,
            funcionario_nome: funcionarioNome,
            data_registro: new Date().toISOString(),
            data_alteracao: dataAlteracao,
            campo: campo,
            valor_antigo: valorAntigo || null,
            valor_novo: valorNovo || null
        };
        
        const { data, error } = await sbClient
            .from('logs_gestor')
            .insert(logData)
            .select();
        
        if (error) {
            console.error('Erro ao salvar log:', error);
            return false;
        }
        
        return true;
    } catch (error) {
        console.error('Exceção ao registrar log:', error);
        return false;
    }
}

// FUNÇÃO CORRIGIDA PARA SALVAR REGISTRO (sem erro de duplicate key)
async function saveRecord(empId, date, field, val, isManager) {
    try {
        // Primeiro, tentar buscar o registro existente
        let { data: existing, error: selectError } = await sbClient
            .from('registros_ponto')
            .select('*')
            .eq('funcionario_id', empId)
            .eq('data', date)
            .maybeSingle();
        
        if (selectError) throw selectError;
        
        const valorAntigo = existing ? existing[field] : null;
        
        // Se o valor não mudou, não faz nada
        if (valorAntigo === val && existing) {
            return true;
        }
        
        let saveSuccess = false;
        
        if (existing) {
            // ATUALIZAR registro existente
            const updateData = {
                [field]: val || null,
                marcado_por: isManager ? 'gestor' : 'funcionario',
                manager_intervention: isManager || existing.manager_intervention
            };
            
            // Manter os outros campos
            if (field !== 'entrada') updateData.entrada = existing.entrada || null;
            if (field !== 'saida_almoco') updateData.saida_almoco = existing.saida_almoco || null;
            if (field !== 'volta_almoco') updateData.volta_almoco = existing.volta_almoco || null;
            if (field !== 'saida') updateData.saida = existing.saida || null;
            if (field !== 'observacao') updateData.observacao = existing.observacao || null;
            
            const { error: updateError } = await sbClient
                .from('registros_ponto')
                .update(updateData)
                .eq('id', existing.id);
            
            if (updateError) throw updateError;
            saveSuccess = true;
        } else {
            // INSERIR novo registro
            const insertData = {
                funcionario_id: empId,
                data: date,
                entrada: null,
                saida_almoco: null,
                volta_almoco: null,
                saida: null,
                observacao: null,
                marcado_por: isManager ? 'gestor' : 'funcionario',
                manager_intervention: isManager
            };
            
            insertData[field] = val || null;
            
            const { error: insertError } = await sbClient
                .from('registros_ponto')
                .insert(insertData);
            
            if (insertError) throw insertError;
            saveSuccess = true;
        }
        
        // Registrar log se foi ação do gestor e houve mudança
        if (saveSuccess && isManager && valorAntigo !== val) {
            const funcionario = employees.find(e => e.id === empId);
            const nomeCampo = {
                'entrada': 'Entrada',
                'saida_almoco': 'Saída Almoço',
                'volta_almoco': 'Volta Almoço',
                'saida': 'Saída',
                'observacao': 'Observação'
            }[field] || field;
            
            await registrarLogGestor(empId, funcionario?.nome || 'Desconhecido', date, nomeCampo, valorAntigo, val);
        }
        
        return true;
    } catch (error) {
        console.error('Erro ao salvar registro:', error);
        if (error.code === '23505') {
            showMessage(`❌ Erro: Registro já existe para esta data. Tente novamente.`, 'error');
        } else {
            showMessage(`❌ Erro ao salvar: ${error.message}`, 'error');
        }
        return false;
    }
}

async function markClock(employee) {
    const t = await getServerTime();
    const date = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const now = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    
    const records = await loadRecords(employee.id, t.getMonth()+1, t.getFullYear());
    const today = records[date] || {};
    
    // Verificar se é dia de jornada reduzida (sábado ou feriado)
    const isReduced = await isReducedDay(t);
    
    let field = '', name = '';
    
    if (isReduced) {
        // Dias reduzidos: apenas Entrada e Saída
        if (!today.entrada) {
            field = 'entrada';
            name = 'Entrada';
        } else if (!today.saida) {
            field = 'saida';
            name = 'Saída';
        } else {
            showMessage('⚠️ Dia completo! (Jornada reduzida - sem almoço)', 'warning');
            return;
        }
    } else {
        // Dias normais: Entrada → Saída Almoço → Volta Almoço → Saída
        if (!today.entrada) {
            field = 'entrada';
            name = 'Entrada';
        } else if (!today.saida_almoco) {
            field = 'saida_almoco';
            name = 'Saída para Almoço';
        } else if (!today.volta_almoco) {
            field = 'volta_almoco';
            name = 'Volta do Almoço';
        } else if (!today.saida) {
            field = 'saida';
            name = 'Saída';
        } else {
            showMessage('⚠️ Dia completo!', 'warning');
            return;
        }
    }
    
    const success = await saveRecord(employee.id, date, field, now, false);
    if (success) {
        const tipoDia = isReduced ? ' (Jornada reduzida)' : '';
        showMessage(`✅ ${name}: ${now}${tipoDia}`, 'success');
        await renderEmployeeGrid();
    }
}

function isDayCompleteForPrint(rec, dow, isHoliday) {
    const isSaturday = dow === 6;
    const isSunday = dow === 0;
    const isSpecialDay = isSunday || isSaturday || isHoliday;
    
    if (isSpecialDay) {
        return rec.entrada && rec.saida;
    }
    
    const hasObservacao = rec.observacao && ['folga','falta','atestado','ferias','feriado-trabalhado','feriado-descanso'].includes(rec.observacao);
    if (hasObservacao) return true;
    
    return rec.entrada && rec.saida_almoco && rec.volta_almoco && rec.saida;
}

function calculateWorked(ent, sAlm, vAlm, sai, isReducedDay) {
    let worked = 0;
    
    if (ent && sai) {
        let eMin = timeToMinutes(ent);
        let sMin = timeToMinutes(sai);
        if (sMin < eMin) sMin += 1440;
        worked = sMin - eMin;
        
        // Só subtrai almoço se NÃO for dia reduzido
        if (!isReducedDay && sAlm && vAlm) {
            let outMin = timeToMinutes(sAlm);
            let inMin = timeToMinutes(vAlm);
            if (inMin < outMin) inMin += 1440;
            worked -= (inMin - outMin);
        } else if (!isReducedDay && worked > 360) {
            worked -= 60;
        }
    }
    
    return Math.max(0, worked);
}

function calculateDayBalance(worked, dow, isHoliday, obs) {
    if (obs === 'folga' || obs === 'atestado' || obs === 'ferias') {
        return { balance: 0, bank: 0, extra: 0 };
    }
    
    if (obs === 'falta') {
        if (dow === 0 || isHoliday) return { balance: 0, bank: 0, extra: 0 };
        if (dow === 6) return { balance: -240, bank: 0, extra: 0 };
        return { balance: -480, bank: 0, extra: 0 };
    }
    
    // Domingo ou Feriado: não gera saldo (considerado dia de descanso)
    if (dow === 0 || isHoliday) {
        return { balance: 0, bank: 0, extra: 0 };
    }
    
    let baseHour = (dow === 6) ? 240 : 480;
    let diff = worked - baseHour;
    
    let bank = 0;
    let extra = 0;
    let balance = diff;
    
    if (diff > 0) {
        if (diff <= 120) {
            bank = diff;
            extra = 0;
        } else {
            bank = 120;
            extra = diff - 120;
        }
    } else if (diff < 0) {
        bank = diff;
        extra = 0;
    }
    
    return { balance: diff, bank: bank, extra: extra };
}

function getObservationText(rec, dow, isHoliday, temHorario) {
    const obs = rec.observacao;
    const isSunday = dow === 0;
    
    if (obs === 'folga') return 'Folga';
    if (obs === 'falta') return 'Falta';
    if (obs === 'atestado') return 'Atestado';
    if (obs === 'ferias') return 'Férias';
    
    if (isHoliday && temHorario) return 'Feriado Trab';
    if (isHoliday && !temHorario) return 'Feriado Desc';
    
    if (isSunday && temHorario) return 'Domingo Trab';
    if (isSunday && !temHorario && !obs) return 'Domingo';
    
    return 'Normal';
}

// FUNÇÃO PARA BUSCAR LOGS DO GESTOR
async function loadGestorLogs(empId, year, month) {
    const startDate = `${year}-${String(month).padStart(2,'0')}-01`;
    const endDate = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
    
    try {
        const { data, error } = await sbClient
            .from('logs_gestor')
            .select('*')
            .eq('funcionario_id', empId)
            .gte('data_alteracao', startDate)
            .lte('data_alteracao', endDate)
            .order('data_registro', { ascending: false });
        
        if (error) {
            console.error('Erro ao carregar logs:', error);
            return [];
        }
        return data || [];
    } catch (error) {
        console.error('Exceção ao carregar logs:', error);
        return [];
    }
}

async function showLogsModal(empId, year, month) {
    const logs = await loadGestorLogs(empId, year, month);
    const logsDiv = document.getElementById('logsList');
    
    if (logs.length === 0) {
        logsDiv.innerHTML = '<div style="text-align:center; padding:20px;">📭 Nenhuma intervenção do gestor registrada neste mês.</div>';
    } else {
        logsDiv.innerHTML = logs.map(log => `
            <div class="log-item">
                <div class="log-date">📅 ${new Date(log.data_registro).toLocaleString('pt-BR')}</div>
                <div><span class="log-field">${log.campo}</span> em ${log.data_alteracao.split('-')[2]}/${log.data_alteracao.split('-')[1]}</div>
                <div>✏️ De: <span class="log-changed">${log.valor_antigo || '—'}</span> → Para: <span class="log-new">${log.valor_novo || '—'}</span></div>
            </div>
        `).join('');
    }
    
    document.getElementById('logsModal').style.display = 'flex';
}

async function renderTabContent(idx) {

    for (let d = 1; d <= days; d++) {
        const date = new Date(year, month-1, d);

        let rec = records[dateKey] || {};
        const isHoliday = holidays.some(h => h.data === dateKey);
        const isReduced = (dow === 6 || isHoliday);
        const temHorario = rec.entrada || rec.saida_almoco || rec.volta_almoco || rec.saida;
        
        let obsVal = rec.observacao || '';
        
        if (dow === 0 && temHorario && !obsVal && !isHoliday) {
            obsVal = 'domingo-trabalhado';
        }
        
        if (isHoliday && !obsVal && !['folga','falta','atestado','ferias'].includes(obsVal)) {
            obsVal = temHorario ? 'feriado-trabalhado' : 'feriado-descanso';
        }
        
        const worked = calculateWorked(rec.entrada, rec.saida_almoco, rec.volta_almoco, rec.saida, isReduced);
        const { balance } = calculateDayBalance(worked, dow, isHoliday, obsVal);
        const obsText = getObservationText({...rec, observacao: obsVal}, dow, isHoliday, temHorario);

        if (dow === 0) rowClass = 'sunday-row';
        else if (dow === 6) rowClass = 'saturday-row';
        if (isHoliday) rowClass = 'holiday-row';

        const almocoStyle = isReduced ? 'background:#f5f5f5;' : '';
        
        html += `<tr class="${rowClass}">

            <td>${dayName}</td>
            <td><input type="time" class="time-input" id="entrada-${idx}-${d}" value="${rec.entrada || ''}" onchange="saveField(${idx},${d},'entrada')"></td>
            <td><input type="time" class="time-input" id="saida_almoco-${idx}-${d}" value="${rec.saida_almoco || ''}" ${almocoDisabled} style="${almocoStyle}" onchange="saveField(${idx},${d},'saida_almoco')"></td>
            <td><input type="time" class="time-input" id="volta_almoco-${idx}-${d}" value="${rec.volta_almoco || ''}" ${almocoDisabled} style="${almocoStyle}" onchange="saveField(${idx},${d},'volta_almoco')"></td>
            <td><input type="time" class="time-input" id="saida-${idx}-${d}" value="${rec.saida || ''}" onchange="saveField(${idx},${d},'saida')"></td>
            <td>${minutesToTime(worked)}</td>
            <td class="${balance >= 0 ? 'positive' : 'negative'}">${minutesToTime(balance)}</td>

async function validateAndPrint(empId, year, month, isTest) {
    const emp = employees.find(e => e.id == empId);
    const records = await loadRecords(emp.id, month, year);
    const days = new Date(year, month, 0).getDate();
    const missing = [];
    
    if (!isTest) {
        for (let d = 1; d <= days; d++) {
            const date = new Date(year, month-1, d);
            const dow = date.getDay();
            const isHoliday = holidays.some(h => {
                const [hY, hM, hD] = h.data.split('-').map(Number);
                return hY === year && hM === month && hD === d;
            });
            const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const rec = records[key] || {};
            
            if (!isDayCompleteForPrint(rec, dow, isHoliday)) {
                missing.push(`${d}/${month} - ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dow]}`);
            }
        }
        if (missing.length) {
            document.getElementById('missingDaysList').innerHTML = missing.map(m => `<div class="missing-day-item">📅 ${m}</div>`).join('');
            document.getElementById('validationModal').style.display = 'flex';
            return;
        }
    }
    await generatePrint(empId, year, month, isTest);
}

window.deleteHoliday = async function(id, date) {
    if (!confirm('Tem certeza que deseja excluir este feriado?')) return;
    
    try {
        const { error } = await sbClient.from('feriados').delete().eq('id', id);
        if (error) throw error;
        
        await loadHolidays();
        const [year, month] = currentMonthYear.split('-').map(Number);
        const [hY, hM] = date.split('-').map(Number);
        
        if (hY === year && hM === month) {
            for (const emp of employees) {
                let { data: ex } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', emp.id).eq('data', date).maybeSingle();
                if (ex && (ex.observacao === 'feriado-trabalhado' || ex.observacao === 'feriado-descanso')) {
                    await sbClient.from('registros_ponto').update({ observacao: null }).eq('id', ex.id);
                }
            }
        }
        renderHolidayList();
        await renderTabContent(currentEmployeeIndex);
        showMessage('✅ Feriado removido!', 'success');
    } catch (error) {
        console.error('Erro ao deletar feriado:', error);
        showMessage(`❌ Erro: ${error.message}`, 'error');
    }
};

async function addHoliday() {
    const date = document.getElementById('holidayDate').value;
    const name = document.getElementById('holidayName').value;
    if (!date || !name) { showMessage('Preencha data e nome', 'warning'); return; }
    
    try {
        const { error } = await sbClient.from('feriados').insert({ data: date, nome: name });
        if (error) throw error;
        
        const [year, month] = currentMonthYear.split('-').map(Number);
        const [hY, hM] = date.split('-').map(Number);
        
        if (hY === year && hM === month) {
            for (const emp of employees) {
                let { data: ex } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', emp.id).eq('data', date).maybeSingle();
                if (ex) {
                    const temHorario = ex.entrada || ex.saida_almoco || ex.volta_almoco || ex.saida;
                    const auto = temHorario ? 'feriado-trabalhado' : 'feriado-descanso';
                    await sbClient.from('registros_ponto').update({ observacao: auto }).eq('id', ex.id);
                } else {
                    await sbClient.from('registros_ponto').insert({ 
                        funcionario_id: emp.id, 
                        data: date, 
                        observacao: 'feriado-descanso', 
                        marcado_por: 'gestor' 
                    });
                }
            }
        }
        document.getElementById('holidayDate').value = '';
        document.getElementById('holidayName').value = '';
        await loadHolidays();
        renderHolidayList();
        await renderTabContent(currentEmployeeIndex);
        showMessage('✅ Feriado adicionado!', 'success');
    } catch (error) {
        console.error('Erro ao adicionar feriado:', error);
        showMessage(`❌ Erro: ${error.message}`, 'error');
    }
}
