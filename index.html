function timeToCompare(t) { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h * 60 + m; }
function timeToMinutes(t) { if (!t) return 0; const [h,m] = t.split(':').map(Number); return (h * 60) + m; }
function minutesToTime(min) { 
    const sign = min < 0 ? '-' : '';
    const abs = Math.abs(min);

// ==================== CÁLCULO DE HORAS ====================
function calculateWorkedMinutes(entrada, saida_almoco, volta_almoco, saida) {
    if (!entrada || !saida) return 0;
    
    let entradaMin = timeToMinutes(entrada);
    let saidaMin = timeToMinutes(saida);
    
    if (saidaMin < entradaMin) {
        saidaMin += 1440;
    }
    
    let worked = saidaMin - entradaMin;
    
    if (saida_almoco && volta_almoco) {
        let almocoOut = timeToMinutes(saida_almoco);
        let almocoIn = timeToMinutes(volta_almoco);
        if (almocoIn < almocoOut) almocoIn += 1440;
        worked -= (almocoIn - almocoOut);
    } else {
        worked -= ALMOCO_PADRAO_MINUTOS;
    }
    
    return Math.max(0, worked);
}

function calculateExpectedMinutes(employee, dayOfWeek) {
    let entrada, saida;
    if (dayOfWeek === 6) {
        entrada = employee.jornada_sabado_entrada;
        saida = employee.jornada_sabado_saida;
    } else {
        entrada = employee.jornada_seg_sex_entrada;
        saida = employee.jornada_seg_sex_saida;
    }
    if (!entrada || !saida) return 0;
    
    let entradaMin = timeToMinutes(entrada);
    let saidaMin = timeToMinutes(saida);
    if (saidaMin < entradaMin) saidaMin += 1440;
    let jornadaBruta = saidaMin - entradaMin;
    
    if (dayOfWeek === 6) return jornadaBruta;
    return jornadaBruta - ALMOCO_PADRAO_MINUTOS;
}

function calculateDayBalance(record, employee, dayOfWeek) {
    // Domingo: só calcula se tiver ponto, senão retorna zero
    if (dayOfWeek === 0 && !record.entrada) {
        return { hoursWorked: 0, dayBalance: 0 };
    }
    
    // Observações especiais zeram o saldo (DOMINGO NUNCA É MARCADO COMO FOLGA AUTOMATICAMENTE)
    if (record.observacao === 'folga' || record.observacao === 'feriado-descanso' || 
        record.observacao === 'falta' || record.observacao === 'atestado' || record.observacao === 'ferias') {
        return { hoursWorked: 0, dayBalance: 0 };
    }
    
    let workedMinutes = calculateWorkedMinutes(record.entrada, record.saida_almoco, record.volta_almoco, record.saida);
    let expectedMinutes = calculateExpectedMinutes(employee, dayOfWeek);
    let balanceMinutes = workedMinutes - expectedMinutes;
    
    return { hoursWorked: workedMinutes, dayBalance: Math.round(balanceMinutes) };
}

// ==================== FUNÇÃO PARA ATUALIZAR OBSERVAÇÃO AUTOMÁTICA ====================
async function atualizarObservacaoAutomatica(employeeId, date, dayOfWeek) {
    let { data: record } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', employeeId).eq('data', date).maybeSingle();
    if (!record) return;
    
    const isHoliday = holidays.some(h => h.data === date);
    let novaObs = record.observacao || '';
    
    // REGRA 1: FERIADO - só altera se não for observação manual
    const observacoesManuais = ['falta', 'atestado', 'ferias', 'folga'];
    if (isHoliday && !observacoesManuais.includes(record.observacao)) {
        if (record.entrada) {
            novaObs = 'feriado-trabalhado';
        } else {
            novaObs = 'feriado-descanso';
        }
    }
    
    // REGRA 2: DOMINGO - NUNCA marca como folga, mantém o que está (Normal)
    // Não faz nenhuma alteração automática para domingo
    
    // Salvar se houver mudança
    if (novaObs !== record.observacao) {
        await sbClient.from('registros_ponto').update({ observacao: novaObs }).eq('id', record.id);
        console.log(`🔄 Observação atualizada para ${date}: ${novaObs || 'Normal'}`);
    }
}

async function loadRecords(employeeId, month, year) {
    const start = `${year}-${String(month).padStart(2,'0')}-01`;
    const end = `${year}-${String(month).padStart(2,'0')}-${new Date(year, month, 0).getDate()}`;
    const { data, error } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', employeeId).gte('data', start).lte('data', end);
    if (error) return {};
    const records = {};
    if (data) data.forEach(r => { records[r.data] = r; });
    return records;
}

async function saveRecord(employeeId, date, field, val, isManager) {
    let { data: existing } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', employeeId).eq('data', date).maybeSingle();
    const record = { funcionario_id: employeeId, data: date, [field]: val, marcado_por: isManager ? 'gestor' : 'funcionario', manager_intervention: isManager };
    if (existing) {
        record.entrada = existing.entrada;
        record.saida_almoco = existing.saida_almoco;
        record.volta_almoco = existing.volta_almoco;
        record.saida = existing.saida;
        record.observacao = existing.observacao;
        await sbClient.from('registros_ponto').update(record).eq('id', existing.id);
    } else {
        await sbClient.from('registros_ponto').insert(record);
    }
}

            feriados: feriadosData || [],
            registros: registros || [],
            data_backup: new Date().toISOString().split('T')[0]
        };
        
        const { error } = await sbClient.from('backups_ponto').upsert({ 
            data_backup: backupData.data_backup, 
            dados: backupData, 
            resumo: `Backup - Func: ${funcionarios?.length || 0}, Registros: ${registros?.length || 0}`
        }, { onConflict: 'data_backup' });
        
        if (error) throw error;
    } catch(e) { console.error('Erro backup:', e); }
}

async function createBackupNow() {

    await criarBackupAutomatico();
    showMessage('✅ Backup criado!', 'success');
    await carregarListaBackups();
}

async function carregarListaBackups() {
    const { data, error } = await sbClient.from('backups_ponto').select('*').order('data_backup', { ascending: false });
    const listaDiv = document.getElementById('backupList');
    const restoreBtn = document.getElementById('restoreBtn');
    
    if (error || !data || data.length === 0) {
        listaDiv.innerHTML = '<p style="text-align:center;">Nenhum backup encontrado</p>';
        restoreBtn.disabled = true;
        return;
    }
    
    listaDiv.innerHTML = data.map(backup => `
        <div class="backup-item" onclick="selecionarBackup('${backup.data_backup}')" data-date="${backup.data_backup}">
            <div class="backup-date">📅 ${new Date(backup.data_backup).toLocaleDateString('pt-BR')}</div>
            <div class="backup-info">${backup.resumo || 'Backup do sistema'}</div>
        </div>
    `).join('');
    restoreBtn.disabled = true;
}

window.selecionarBackup = function(date) {
    selectedBackupDate = date;
    document.querySelectorAll('.backup-item').forEach(item => {
        item.style.backgroundColor = item.getAttribute('data-date') === date ? '#e3f2fd' : '';
    });
    document.getElementById('restoreBtn').disabled = false;
};

async function restoreFromBackup() {
    if (!selectedBackupDate) { showMessage('Selecione um backup', 'warning'); return; }
    if (!confirm(`⚠️ Restaurar backup de ${new Date(selectedBackupDate).toLocaleDateString('pt-BR')}? Isso substituirá todos os dados atuais.`)) return;
    
    showMessage('🔄 Restaurando...', 'warning');
    try {
        const { data, error } = await sbClient.from('backups_ponto').select('dados').eq('data_backup', selectedBackupDate).single();
        if (error) throw error;
        
        const backup = data.dados;
        if (backup.funcionarios) {
            await sbClient.from('funcionarios').delete().neq('id', 0);
            for (const func of backup.funcionarios) await sbClient.from('funcionarios').insert(func);
        }
        if (backup.feriados) {
            await sbClient.from('feriados').delete().neq('id', 0);
            for (const fer of backup.feriados) await sbClient.from('feriados').insert(fer);
        }
        if (backup.registros) {
            await sbClient.from('registros_ponto').delete().neq('id', 0);
            for (const reg of backup.registros) await sbClient.from('registros_ponto').insert(reg);
        }
        
        showMessage('✅ Backup restaurado!', 'success');
        closeBackupModal();
        await loadEmployees();
        await loadHolidays();
        await renderEmployeeGrid();
        if (document.getElementById('managementArea').style.display === 'block') {
            renderTabs();
            await renderTabContent(currentEmployeeIndex);
        }
    } catch(e) { showMessage('❌ Erro ao restaurar', 'error'); }
}

async function markClock(employee) {
    const t = await getServerTime();
    const date = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    const now = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
    const dayOfWeek = t.getDay();
    
    const records = await loadRecords(employee.id, t.getMonth()+1, t.getFullYear());
    const today = records[date] || {};
    
    let field = '', name = '';
    if (!today.entrada) { field = 'entrada'; name = 'Entrada'; }
    else if (!today.saida_almoco) { field = 'saida_almoco'; name = 'Saída Alm'; }
    else if (!today.volta_almoco) { field = 'volta_almoco'; name = 'Volta Alm'; }
    else if (!today.saida) { field = 'saida'; name = 'Saída'; }
    else { showMessage('⚠️ Dia completo!', 'warning'); return; }
    
    await saveRecord(employee.id, date, field, now, false);
    
    // ATUALIZAR OBSERVAÇÃO AUTOMÁTICA
    await atualizarObservacaoAutomatica(employee.id, date, dayOfWeek);
    
    showMessage(`✅ ${name}: ${now}`, 'success');
    await renderEmployeeGrid();
    
    if (Math.random() < 0.1) await criarBackupAutomatico();
}

async function renderEmployeeGrid() {
    await loadEmployees();
    const grid = document.getElementById('employeeGrid');
    if (!grid) return;
    grid.innerHTML = '';
    
    const t = await getServerTime();
    const todayKey = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
    
    const sortedEmployees = [...employees].sort((a,b) => {
        const horaA = HORARIOS_CHEGADA[a.nome.split(' ')[0]] || '12:00';
        const horaB = HORARIOS_CHEGADA[b.nome.split(' ')[0]] || '12:00';
        return timeToCompare(horaA) - timeToCompare(horaB);
    });
    
    for (const emp of sortedEmployees) {
        const isActive = !inactiveEmployeeIds.includes(emp.id);
        const records = await loadRecords(emp.id, t.getMonth()+1, t.getFullYear());
        const today = records[todayKey] || {};
        const nome = NOMES_ABREVIADOS[emp.nome.split(' ')[0]] || emp.nome.split(' ')[0];
        
        let status = '', sClass = '';
        if (!isActive) {
            status = '⛔ Inativo';
            sClass = 'status-inactive';
        } else if (today.entrada && today.saida_almoco && today.volta_almoco && today.saida) {
            status = '✅ Completo';
            sClass = 'status-complete';
        } else if (today.entrada) {
            status = '🟡 Andamento';
            sClass = 'status-incomplete';
        } else {
            status = '⚪ Pendente';
            sClass = 'status-none';
        }
        
        const card = document.createElement('div');
        card.className = `employee-card ${!isActive ? 'inactive' : ''}`;
        card.innerHTML = `
            <div class="employee-info">
                <h3>${nome} ${!isActive ? '<small>(Inativo)</small>' : ''}</h3>
                <div class="clock-preview">
                    <span>⏰ ${today.entrada || '--:--'}</span>
                    <span>🍽️ ${today.saida_almoco || '--:--'}</span>
                    <span>🍽️ ${today.volta_almoco || '--:--'}</span>
                    <span>🏠 ${today.saida || '--:--'}</span>
                </div>
            </div>
            <div class="status-badge ${sClass}">${status}</div>
        `;
        if (isActive) card.onclick = () => showEmployeeModal(emp);
        grid.appendChild(card);
    }
    
    updateDateTime();
}

            renderTabs();

        };

    });
}

window.saveField = async function(idx, day, field) {
    const emp = employees[idx];
    const [year, month] = currentMonthYear.split('-').map(Number);
    const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const inputElement = document.getElementById(`${field}-${idx}-${day}`);
    let val = inputElement.value;
    const dateObj = new Date(dateKey);
    const dayOfWeek = dateObj.getDay();
    
    let { data: existing } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', emp.id).eq('data', dateKey).maybeSingle();
    
    if (val === '') {
        if (existing) {
            const updatedRecord = {
                entrada: existing.entrada || null,
                saida_almoco: existing.saida_almoco || null,
                volta_almoco: existing.volta_almoco || null,
                saida: existing.saida || null,
                observacao: existing.observacao,
                marcado_por: 'gestor',
                manager_intervention: true
            };
            updatedRecord[field] = null;
            await sbClient.from('registros_ponto').update(updatedRecord).eq('id', existing.id);
            showMessage(`✅ ${field} removido!`, 'success');
        }
    } else {
        if (existing) {
            const updatedRecord = {
                entrada: existing.entrada,
                saida_almoco: existing.saida_almoco,
                volta_almoco: existing.volta_almoco,
                saida: existing.saida,
                observacao: existing.observacao,
                [field]: val,
                marcado_por: 'gestor',
                manager_intervention: true
            };
            await sbClient.from('registros_ponto').update(updatedRecord).eq('id', existing.id);
            showMessage(`✅ ${field} alterado para ${val}`, 'success');
        } else {
            const newRecord = {
                funcionario_id: emp.id,
                data: dateKey,
                [field]: val,
                marcado_por: 'gestor',
                manager_intervention: true
            };
            await sbClient.from('registros_ponto').insert(newRecord);
            showMessage(`✅ ${field} adicionado: ${val}`, 'success');
        }
    }
    
    // ATUALIZAR OBSERVAÇÃO AUTOMÁTICA
    await atualizarObservacaoAutomatica(emp.id, dateKey, dayOfWeek);
    await renderTabContent(idx);
};

async function renderTabContent(idx) {
    const emp = employees[idx];
    const [year, month] = currentMonthYear.split('-').map(Number);
    const days = new Date(year, month, 0).getDate();
    const records = await loadRecords(emp.id, month, year);
    const isActive = !inactiveEmployeeIds.includes(emp.id);
    
    let html = `<div class="jornada-edit"><h4>✏️ Jornada</h4><div style="display:flex; gap:8px; flex-wrap:wrap;">
        <div><label style="font-size:10px;">Seg-Sex:</label><br><input type="time" class="jornada-input" value="${emp.jornada_seg_sex_entrada}" ${!isActive ? 'disabled' : ''} onchange="updateJornada(${emp.id},'jornada_seg_sex_entrada',this.value)"> 
        <input type="time" class="jornada-input" value="${emp.jornada_seg_sex_saida}" ${!isActive ? 'disabled' : ''} onchange="updateJornada(${emp.id},'jornada_seg_sex_saida',this.value)"></div>
        <div><label style="font-size:10px;">Sábado:</label><br><input type="time" class="jornada-input" value="${emp.jornada_sabado_entrada}" ${!isActive ? 'disabled' : ''} onchange="updateJornada(${emp.id},'jornada_sabado_entrada',this.value)"> 
        <input type="time" class="jornada-input" value="${emp.jornada_sabado_saida}" ${!isActive ? 'disabled' : ''} onchange="updateJornada(${emp.id},'jornada_sabado_saida',this.value)"></div>
    </div></div>
    <div class="employee-actions" style="margin-bottom:12px;">
        ${isActive ? `<button onclick="editEmployee(${emp.id})" class="btn-small" style="background:#3498db;">✏️ Editar</button>
        <button onclick="toggleEmployeeActive(${emp.id}, false)" class="btn-small" style="background:#e74c3c;">⛔ Inativar</button>` :
        `<button onclick="toggleEmployeeActive(${emp.id}, true)" class="btn-small" style="background:#27ae60;">✅ Reativar</button>
        <button onclick="deleteEmployee(${emp.id})" class="btn-small" style="background:#e74c3c;">🗑️ Excluir</button>`}
        <button onclick="showBackupModal()" class="btn-small" style="background:#6c757d;">💾 Backup</button>
    </div>`;
    
    if (!isActive) {
        html += `<div style="background:#ffebee; padding:10px; border-radius:12px; margin-bottom:12px; text-align:center;">
            ⚠️ Funcionário INATIVO - Não pode marcar ponto e não é considerado nos cálculos
        </div>`;
    }
    
    html += `<div class="table-wrapper"><table class="timesheet-table"><thead><tr><th>Data</th><th>Dia</th><th>Ent</th><th>Sai Alm</th><th>Vol Alm</th><th>Sai</th><th>H.T.</th><th>Saldo</th><th>Obs</th></tr></thead><tbody>`;
    
    for (let d = 1; d <= days; d++) {
        const date = new Date(year, month-1, d);
        const dow = date.getDay();
        const dayName = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'][dow];
        const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let rec = records[dateKey] || {};
        const isHoliday = holidays.some(h => h.data === dateKey);
        
        // Se não tem observação, calcular automaticamente (sem forçar folga em domingo)
        if (!rec.observacao) {
            if (isHoliday) {
                if (rec.entrada) {
                    rec.observacao = 'feriado-trabalhado';
                } else {
                    rec.observacao = 'feriado-descanso';
                }
            }
            // DOMINGO: NÃO força nada, mantém como Normal (vazio)
        }
        
        const { hoursWorked, dayBalance } = calculateDayBalance(rec, emp, dow);
        
        let obsVal = rec.observacao || '';
        let obsText = '';
        
        // Lógica para DOMINGO - NUNCA marca como folga
        if (dow === 0 && !obsVal) {
            obsVal = ''; // Normal
        }
        
        // Lógica para FERIADO
        if (isHoliday && !obsVal) {
            obsVal = rec.entrada ? 'feriado-trabalhado' : 'feriado-descanso';
        }
        
        if (obsVal === 'folga') obsText = 'Folga';
        else if (obsVal === 'falta') obsText = 'Falta';
        else if (obsVal === 'atestado') obsText = 'Atestado';
        else if (obsVal === 'ferias') obsText = 'Férias';
        else if (obsVal === 'feriado-trabalhado') obsText = 'Feriado Trabalhado';
        else if (obsVal === 'feriado-descanso') obsText = 'Feriado Descanso';
        else obsText = 'Normal';
        
        let rowClass = '';
        if (dow === 0) rowClass = 'sunday-row';
        else if (dow === 6) rowClass = 'saturday-row';
        if (isHoliday) rowClass = 'holiday-row';
        
        html += `<tr class="${rowClass}">
            <td>${String(d).padStart(2,'0')}/${String(month).padStart(2,'0')}</td><td style="font-size:9px;">${dayName}</td>
            <td><input type="time" class="time-input" id="entrada-${idx}-${d}" value="${rec.entrada || ''}" ${!isActive ? 'disabled' : ''} onchange="saveField(${idx},${d},'entrada')"></td>
            <td><input type="time" class="time-input" id="saida_almoco-${idx}-${d}" value="${rec.saida_almoco || ''}" ${!isActive ? 'disabled' : ''} onchange="saveField(${idx},${d},'saida_almoco')"></td>
            <td><input type="time" class="time-input" id="volta_almoco-${idx}-${d}" value="${rec.volta_almoco || ''}" ${!isActive ? 'disabled' : ''} onchange="saveField(${idx},${d},'volta_almoco')"></td>
            <td><input type="time" class="time-input" id="saida-${idx}-${d}" value="${rec.saida || ''}" ${!isActive ? 'disabled' : ''} onchange="saveField(${idx},${d},'saida')"></td>
            <td>${minutesToTime(hoursWorked)}</td>
            <td class="${dayBalance >= 0 ? 'positive' : 'negative'}">${minutesToTime(dayBalance)}</td>
            <td><select id="obs-${idx}-${d}" onchange="saveObs(${idx},${d})" ${!isActive ? 'disabled' : ''}>
                <option value="" ${obsVal === '' ? 'selected' : ''}>Normal</option>
                <option value="folga" ${obsVal === 'folga' ? 'selected' : ''}>Folga</option>
                <option value="falta" ${obsVal === 'falta' ? 'selected' : ''}>Falta</option>
                <option value="atestado" ${obsVal === 'atestado' ? 'selected' : ''}>Atestado</option>
                <option value="ferias" ${obsVal === 'ferias' ? 'selected' : ''}>Férias</option>
            </select></td>
        </tr>`;
    }
    
    html += `</tbody></table></div>`;
    
    // Cálculo dos totais
    let totalHoras = 0, banco = 0, extras = 0, neg = 0, faltas = 0, folgas = 0, ferTrab = 0, intervs = 0;
    
    for (let d = 1; d <= days; d++) {
        const dateKey = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const rec = records[dateKey] || {};
        const date = new Date(year, month-1, d);
        const { hoursWorked, dayBalance } = calculateDayBalance(rec, emp, date.getDay());
        
        if (isActive) {
            totalHoras += hoursWorked;
            if (dayBalance > 0) {
                if (dayBalance <= 120) banco += dayBalance;
                else { banco += 120; extras += (dayBalance - 120); }
            } else if (dayBalance < 0) neg += Math.abs(dayBalance);
        }
        
        if (rec.observacao === 'falta') faltas++;
        if (rec.observacao === 'folga') folgas++;
        if (rec.observacao === 'feriado-trabalhado') ferTrab++;
        if (rec.manager_intervention) intervs++;
    }
    
    const saldoFinal = banco - neg;
    html += `<div class="summary-grid">
        <div class="summary-item"><div>📊 Total Horas</div><div class="summary-value">${minutesToTime(totalHoras)}</div></div>
        <div class="summary-item"><div>💰 Banco (+)</div><div class="summary-value positive">${minutesToTime(banco)}</div></div>
        <div class="summary-item"><div>📉 Banco (-)</div><div class="summary-value negative">${minutesToTime(-neg)}</div></div>
        <div class="summary-item"><div>⭐ H. Extras</div><div class="summary-value positive">${minutesToTime(extras)}</div></div>
    </div><div class="summary-grid">
        <div class="summary-item"><div>⚖️ Saldo Final</div><div class="summary-value ${saldoFinal >= 0 ? 'positive' : 'negative'}">${minutesToTime(saldoFinal)}<br><small>(${(saldoFinal/60).toFixed(2)}h)</small></div></div>
        <div class="summary-item"><div>📅 Faltas</div><div class="summary-value">${faltas}</div></div>
        <div class="summary-item"><div>🏖️ Folgas</div><div class="summary-value">${folgas}</div></div>
        <div class="summary-item"><div>👤 Interv.</div><div class="summary-value">${intervs}</div></div>
    </div><div class="print-btn-container">
        <button onclick="validateAndPrint('${emp.id}',${year},${month})" class="success" style="width:auto; padding:8px 20px;">🖨️ Imprimir</button>
    </div>`;
    
    document.getElementById('tabContent').innerHTML = html;
}

// ==================== FUNÇÃO ADDHOLIDAY ====================
async function addHoliday() {
    const date = document.getElementById('holidayDate').value;
    const name = document.getElementById('holidayName').value;
    if (!date || !name) { showMessage('Preencha data e nome', 'warning'); return; }
    
    await sbClient.from('feriados').insert({ data: date, nome: name });
    
    const [year, month] = currentMonthYear.split('-').map(Number);
    const [hYear, hMonth] = date.split('-').map(Number);
    const dateObj = new Date(date);
    const dayOfWeek = dateObj.getDay();
    
    if (hYear === year && hMonth === month) {
        for (const emp of employees) {
            let { data: existing } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', emp.id).eq('data', date).maybeSingle();
            
            if (existing) {
                if (existing.entrada) {
                    await sbClient.from('registros_ponto').update({ observacao: 'feriado-trabalhado' }).eq('id', existing.id);
                } else {
                    await sbClient.from('registros_ponto').update({ observacao: 'feriado-descanso' }).eq('id', existing.id);
                }
            } else {
                // Se não existe registro, cria com feriado-descanso (não bateu ponto)
                await sbClient.from('registros_ponto').insert({ 
                    funcionario_id: emp.id, 
                    data: date, 
                    observacao: 'feriado-descanso', 
                    marcado_por: 'gestor', 
                    manager_intervention: true 
                });
            }
        }
    }
    
    document.getElementById('holidayDate').value = '';
    document.getElementById('holidayName').value = '';
    await loadHolidays();
    renderHolidayList();
    await renderTabContent(currentEmployeeIndex);
    showMessage('✅ Feriado adicionado!', 'success');
}

// ==================== FUNÇÃO DELETEHOLIDAY ====================
window.deleteHoliday = async function(id) {
    const holidayToDelete = holidays.find(h => h.id == id);
    const holidayDate = holidayToDelete ? holidayToDelete.data : null;
    
    await sbClient.from('feriados').delete().eq('id', id);
    await loadHolidays();
    renderHolidayList();
    
    if (holidayDate) {
        const [year, month] = currentMonthYear.split('-').map(Number);
        const [hYear, hMonth] = holidayDate.split('-').map(Number);
        
        if (hYear === year && hMonth === month) {
            for (const emp of employees) {
                let { data: existing } = await sbClient.from('registros_ponto').select('*').eq('funcionario_id', emp.id).eq('data', holidayDate).maybeSingle();
                if (existing) {
                    await sbClient.from('registros_ponto').update({ observacao: '' }).eq('id', existing.id);
                }
            }
        }
    }
    
    await renderTabContent(currentEmployeeIndex);
    showMessage('✅ Feriado removido!', 'success');
};

// ==================== FUNÇÃO RENDER HOLIDAY LIST ====================
function renderHolidayList() {
    const div = document.getElementById('holidayList');
    if (!div) return;
    if (!holidays.length) { div.innerHTML = '<p>Nenhum feriado cadastrado</p>'; return; }
    div.innerHTML = holidays.map(h => `<div class="holiday-tag">${h.data.split('-')[2]}/${h.data.split('-')[1]} - ${h.nome} <button onclick="deleteHoliday('${h.id}')">×</button></div>`).join('');
}

// ==================== IMPRESSÃO ====================
async function validateAndPrint(empId, year, month, isTest = false) {
    const emp = employees.find(e => e.id == empId);
    const records = await loadRecords(emp.id, month, year);
    const days = new Date(year, month, 0).getDate();
    const missing = [];
    
    if (!isTest) {
        for (let d = 1; d <= days; d++) {
            const date = new Date(year, month-1, d);
            if (date.getDay() === 0) continue;
            const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const rec = records[key] || {};
            const temHorario = rec.entrada || rec.saida_almoco || rec.volta_almoco || rec.saida;
            const obsOk = ['folga','falta','atestado','ferias','feriado-descanso','feriado-trabalhado'].includes(rec.observacao);
            if (!temHorario && !obsOk) missing.push(`${d}/${month}`);
        }
        
        if (missing.length) {
            document.getElementById('missingDaysList').innerHTML = missing.map(m => `<div class="missing-day-item">📅 ${m}</div>`).join('');
            document.getElementById('validationModal').style.display = 'flex';
            return;
        }
    }
    
    await generatePrint(empId, year, month, isTest);
}

async function generatePrint(empId, year, month, isTest = false) {
    const emp = employees.find(e => e.id == empId);
    const records = await loadRecords(emp.id, month, year);
    const days = new Date(year, month, 0).getDate();
    const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    let total = 0, banco = 0, extras = 0, neg = 0, faltas = 0, folgas = 0, ferTrab = 0, intervs = 0;
    let rows = '';
    
    for (let d = 1; d <= days; d++) {
        const date = new Date(year, month-1, d);
        const dow = date.getDay();
        const dayName = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dow];
        const key = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const rec = records[key] || {};
        const { hoursWorked, dayBalance } = calculateDayBalance(rec, emp, dow);
        total += hoursWorked;
        
        if (dayBalance > 0) {
            if (dayBalance <= 120) banco += dayBalance;
            else { banco += 120; extras += (dayBalance - 120); }
        } else if (dayBalance < 0) neg += Math.abs(dayBalance);
        
        if (rec.observacao === 'falta') faltas++;
        if (rec.observacao === 'folga') folgas++;
        if (rec.observacao === 'feriado-trabalhado') ferTrab++;
        if (rec.manager_intervention) intervs++;
        
        let obs = '';
        if (rec.observacao === 'folga') obs = 'Folga';
        else if (rec.observacao === 'falta') obs = 'Falta';
        else if (rec.observacao === 'atestado') obs = 'Atestado';
        else if (rec.observacao === 'ferias') obs = 'Férias';
        else if (rec.observacao === 'feriado-trabalhado') obs = 'Feriado Trab';
        else if (rec.observacao === 'feriado-descanso') obs = 'Feriado';
        
        rows += `<tr>
            <td>${String(d).padStart(2,'0')}/${String(month).padStart(2,'0')}</td>
            <td>${dayName}</td>
            <td>${rec.entrada || '—'}</td>
            <td>${rec.saida_almoco || '—'}</td>
            <td>${rec.volta_almoco || '—'}</td>
            <td>${rec.saida || '—'}</td>
            <td>${minutesToTime(hoursWorked)}</td>
            <td>${minutesToTime(dayBalance)}</td>
            <td>${obs}${rec.manager_intervention ? ' *' : ''}</td>
        </table>`;
    }
    
    const saldo = banco - neg;
    const saldoHoras = (saldo / 60).toFixed(2);
    const testWatermark = isTest ? '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-45deg);font-size:48pt;color:rgba(255,0,0,0.3);white-space:nowrap;pointer-events:none;z-index:999;">TESTE - TESTE - TESTE</div>' : '';
    
    const printHtml = `<!DOCTYPE html>
    <html><head><meta charset="UTF-8"><title>${isTest ? 'TESTE - ' : ''}Folha de Ponto - ${emp.nome}</title>
    <style>
        body{font-family:'Courier New',monospace;padding:8mm;font-size:10pt;margin:0}
        @page{size:A4;margin:8mm}
        .header{text-align:center;border-bottom:2px solid #000;padding-bottom:6px;margin-bottom:10px}
        .header h1{font-size:16pt;margin:0}
        .header h2{font-size:12pt;font-weight:normal;margin:0}
        .info{display:flex;justify-content:space-between;margin-bottom:10px;font-size:8pt}
        table{width:100%;border-collapse:collapse;font-size:7pt}
        th,td{border:1px solid #000;padding:3px;text-align:center}
        th{background:#f2f2f2}
        .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
        .summary-box{border:1px solid #000;padding:5px;text-align:center;font-size:8pt}
        .summary-box strong{display:block;margin-bottom:3px}
        .signature{display:flex;justify-content:space-between;margin-top:20px}
        .signature-line{width:160px;border-top:1px solid #000;margin:6px auto}
        .footer{text-align:center;font-size:6pt;margin-top:10px;border-top:1px solid #ccc;padding-top:5px}
        .positive{color:#27ae60}
        .negative{color:#e74c3c}
    </style>
    </head><body>
    ${testWatermark}
    <div class="header">
        <h1>MUNDO CAROL</h1>
        <h2>FOLHA DE PONTO</h2>
    </div>
    <div class="info">
        <div><strong>Funcionário:</strong> ${emp.nome}<br><strong>CPF:</strong> ${emp.cpf}</div>
        <div><strong>Mês/Ano:</strong> ${months[month-1]}/${year}<br><strong>Jornada:</strong> ${emp.jornada_seg_sex_entrada} às ${emp.jornada_seg_sex_saida} (Seg-Sex) | ${emp.jornada_sabado_entrada} às ${emp.jornada_sabado_saida} (Sáb)</div>
    </div>
    <table><thead><tr><th>Data</th><th>Dia</th><th>Entrada</th><th>Saída Alm</th><th>Volta Alm</th><th>Saída</th><th>H.T.</th><th>Saldo</th><th>Obs</th></tr></thead><tbody>${rows}</tbody></table>
    
    <div class="summary">
        <div class="summary-box"><strong>Total Horas</strong>${minutesToTime(total)}</div>
        <div class="summary-box"><strong>Banco de Horas</strong><span class="positive"> ${minutesToTime(banco)}</span></div>
        <div class="summary-box"><strong>Horas Extras</strong><span class="positive"> ${minutesToTime(extras)}</span></div>
        <div class="summary-box"><strong>Saldo Final</strong><span class="${saldo>=0?'positive':'negative'}"> ${minutesToTime(saldo)} (${saldoHoras}h)</span></div>
    </div>
    <div class="summary" style="margin-top:5px;">
        <div class="summary-box"><strong>Faltas</strong> ${faltas} dia(s)</div>
        <div class="summary-box"><strong>Folgas</strong> ${folgas} dia(s)</div>
        <div class="summary-box"><strong>Feriados Trab</strong> ${ferTrab} dia(s)</div>
        <div class="summary-box"><strong>Intervenções</strong> ${intervs}</div>
    </div>
    
    <div class="signature">
        <div style="text-align:center;"><div class="signature-line"></div>Assinatura do Funcionário</div>
        <div style="text-align:center;"><div class="signature-line"></div>Assinatura do Responsável</div>
    </div>
    <div class="footer">
        Documento eletrônico. * = Registro alterado pelo Gestor.<br>
        Emitido em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}
    </div>
    <script>window.onload=function(){window.print();};<\/script>
    </body></html>`;
    
    const win = window.open('', '_blank');
    win.document.write(printHtml);
    win.document.close();
}
